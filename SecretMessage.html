<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secret Message App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
<h1 class="text-center mt-5">🔐Secret Message App</h1>
<div class="card my-4" >
    <div class="card-body">
        <div class="form-floating">
            <textarea class="form-control" placeholder="Leave a comment here" id="secretMessageTextArea"></textarea>
            <label for="secretMessageTextArea">Enter Your Secret Message</label>
            <button id="secretLinkGenerateButton" type="button" class="btn btn-dark my-4">Generate Secret Message Link</button>
        </div>
        <div id="showSecretLinkBox" class="alert alert-dark" role="alert">
            Link Will Show Here
        </div>

    </div>
</div>

    <div class="card my-4 " >
        <div class="card-body">

            <div id="showMessagebox" class="alert alert-dark" role="alert">
                Your Message Will Show Here
            </div>
           

        </div>
    </div>

</div>



<script src="index4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
